services:
  nuxt:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nuxt_app
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    restart: unless-stopped

volumes:
  node_modules: